name: Publish

on:
  workflow_run:
    workflows: ["CI"]
    types: [completed]
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  publish:
    name: Publish
    if: ${{ github.event.workflow_run.conclusion == 'success' }}
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write

    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Setup pnpm
        uses: pnpm/action-setup@v5

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "24"
          cache: "pnpm"

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Get release info
        id: release-info
        run: |
          pnpm changeset status --output=release.json 2>/dev/null || echo '{"releases":[]}' > release.json
          node <<NODE
          const fs = require('fs');
          const release = JSON.parse(fs.readFileSync('release.json', 'utf8'));
          const releases = release.releases?.filter(r => r.type !== 'none') || [];

          const pkg = JSON.parse(fs.readFileSync('package.json', 'utf8'));
          const packageName = pkg.name || 'unknown-package';
          const fallbackVersion = pkg.version || '0.0.0';

          let title = 'Updating ' + packageName + ' to version ' + fallbackVersion;
          let commit = packageName + '@' + fallbackVersion;
          if (releases.length === 1) {
            const { name, newVersion } = releases[0];
            title = 'Updating ' + name + ' to version ' + newVersion;
            commit = name + '@' + newVersion;
          } else if (releases.length > 1) {
            const summary = releases.map(r => r.name + '@' + r.newVersion).join(', ');
            title = 'Updating ' + summary;
            commit = summary;
          }

          fs.appendFileSync(process.env.GITHUB_OUTPUT, 'title=' + title + '\n');
          fs.appendFileSync(process.env.GITHUB_OUTPUT, 'commit=' + commit + '\n');
          NODE
          rm -f release.json
        continue-on-error: true

      - name: Create Release PR or bump version
        id: changesets
        uses: changesets/action@v1
        with:
          version: pnpm changeset version
          title: ${{ steps.release-info.outputs.title }}
          commit: ${{ steps.release-info.outputs.commit }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Create GitHub release and tag
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          current_version=$(node -p "require('./package.json').version")

          if [ "$(git rev-list --count HEAD)" -lt 2 ]; then
            echo "Not enough history to compare versions"
            exit 0
          fi

          previous_version=$(git show HEAD~1:package.json | node -p "JSON.parse(require('fs').readFileSync(0,'utf8')).version")

          if [ "$current_version" = "$previous_version" ]; then
            echo "No version change ($current_version), skipping release"
            exit 0
          fi

          tag="v${current_version}"

          if ! git rev-parse "$tag" >/dev/null 2>&1; then
            git tag "$tag"
            git push origin "$tag"
          fi

          if ! gh release view "$tag" >/dev/null 2>&1; then
            gh release create "$tag" --title "$tag" --notes "Release ${tag}"
          fi
